<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F39C12;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F1C40F;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Icon: Cup with gift ribbon -->
  <g transform="translate(16, 10)">
    <!-- Cup body -->
    <path d="M18 22 L24 90 C24.5 95 28 98 33 98 L63 98 C68 98 71.5 95 72 90 L78 22 Z"
          fill="rgba(255,255,255,0.9)" rx="2"/>
    <!-- Cup rim -->
    <rect x="14" y="16" width="68" height="10" rx="5" fill="rgba(255,255,255,0.9)"/>
    <!-- Cup highlight -->
    <path d="M28 30 L32 82" stroke="rgba(255,255,255,0.4)" stroke-width="3" stroke-linecap="round"/>
    <!-- Gift ribbon vertical -->
    <path d="M48 22 L48 98" stroke="url(#accentGrad)" stroke-width="4"/>
    <!-- Gift ribbon horizontal -->
    <path d="M18 55 L78 55" stroke="url(#accentGrad)" stroke-width="4"/>
    <!-- Ribbon bow left -->
    <path d="M48 55 C40 45 30 42 36 36 C42 30 46 40 48 48" fill="#F39C12" stroke="#E67E22" stroke-width="1"/>
    <!-- Ribbon bow right -->
    <path d="M48 55 C56 45 66 42 60 36 C54 30 50 40 48 48" fill="#F1C40F" stroke="#E67E22" stroke-width="1"/>
    <!-- Small star/sparkle -->
    <circle cx="70" cy="20" r="3" fill="#F39C12" opacity="0.8"/>
    <circle cx="26" cy="14" r="2" fill="#F1C40F" opacity="0.6"/>
  </g>

  <!-- Text: Prime -->
  <text x="110" y="72" font-family="Arial, Helvetica, sans-serif" font-size="48" font-weight="700" fill="#FFFFFF" letter-spacing="-1">
    Prime
  </text>
  <!-- Text: Gift -->
  <text x="258" y="72" font-family="Arial, Helvetica, sans-serif" font-size="48" font-weight="700" fill="#AED6F1" letter-spacing="-1">
    Gift
  </text>

  <!-- Tagline -->
  <text x="112" y="95" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="400" fill="rgba(255,255,255,0.6)" letter-spacing="3">
    A SUA MARCA EM CADA DETALHE
  </text>

  <!-- Subtle underline accent -->
  <rect x="110" y="78" width="80" height="2.5" rx="1.25" fill="url(#accentGrad)"/>
</svg>
